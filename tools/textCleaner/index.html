<main>
<section class="hero"><div class="container"><div class="hero-card"><div class="pill">텍스트 정리 · 여러 옵션</div><h1>텍스트 정리기</h1><p>중복 공백 제거, 빈 줄 삭제, 줄 앞뒤 공백 제거, 중복 줄 제거 등 자주 쓰는 텍스트 정리 옵션을 한 번에 적용합니다.</p></div></div></section>
<section class="section"><div class="container"><div class="panel">
<div class="control-row">
<label class="checkbox"><input checked="" id="trimLines" type="checkbox"/> 각 줄 앞뒤 공백 제거</label>
<label class="checkbox"><input checked="" id="removeEmpty" type="checkbox"/> 빈 줄 제거</label>
<label class="checkbox"><input checked="" id="collapseSpaces" type="checkbox"/> 연속 공백 1칸으로</label>
<label class="checkbox"><input id="dedupeLines" type="checkbox"/> 중복 줄 제거</label>
<button class="btn btn-primary" id="runBtn">정리하기</button>
<button class="btn btn-light" id="copyBtn">복사</button>
<button class="btn btn-light" id="sampleBtn">예시 넣기</button>
</div>
<div class="grid-2">
<div><label class="label">원본 텍스트</label><textarea id="inputText"></textarea></div>
<div><label class="label">정리 결과</label><textarea class="output" id="outputText" readonly=""></textarea></div>
</div>
<div class="msg" id="message"></div>
</div></div></section>
</main>
<script>
    const t = (key) => (window.ToolI18n ? window.ToolI18n.t(key) : key);
    const inputEl = document.getElementById('inputText');
    const outputEl = document.getElementById('outputText');
    const msgEl = document.getElementById('message');
    const sample = `   hello   world

   hello   world

line   with   many   spaces

end   `;
    function setMessage(text, ok=false){ msgEl.textContent = text || ''; msgEl.className = ok ? 'msg ok' : 'msg'; }
    document.getElementById('runBtn').addEventListener('click', ()=>{
      let lines = inputEl.value.replace(/\r\n/g, '\n').split('\n');
      if (document.getElementById('trimLines').checked) lines = lines.map(v => v.trim());
      if (document.getElementById('collapseSpaces').checked) lines = lines.map(v => v.replace(/[ 	]{2,}/g, ' '));
      if (document.getElementById('removeEmpty').checked) lines = lines.filter(v => v !== '');
      if (document.getElementById('dedupeLines').checked) lines = [...new Set(lines)];
      outputEl.value = lines.join('\n');
      setMessage(t('msg_done_format'), true);
    });
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ if(!outputEl.value) return setMessage(t('msg_no_result')); await navigator.clipboard.writeText(outputEl.value); setMessage(t('msg_copied'), true); });
    document.getElementById('sampleBtn').addEventListener('click', ()=>{ inputEl.value = sample; outputEl.value=''; setMessage(''); });
    inputEl.value = sample;
  </script>
