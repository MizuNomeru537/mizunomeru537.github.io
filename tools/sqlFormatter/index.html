  <main>
    <section class="hero"><div class="container"><div class="hero-card"><div class="pill">SQL · 기본 포맷터</div><h1>SQL 정리기</h1><p>SELECT, FROM, WHERE, JOIN, GROUP BY 같은 핵심 구문 기준으로 줄바꿈과 정렬을 적용하는 기본 SQL 포맷터입니다.</p></div></div></section>
    <section class="section"><div class="container"><div class="panel">
      <div class="control-row">
        <label>키워드 대소문자
          <select id="caseMode">
            <option value="upper">대문자</option>
            <option value="lower">소문자</option>
            <option value="keep">유지</option>
          </select>
        </label>
        <button class="btn btn-primary" id="formatBtn">정리하기</button>
        <button class="btn btn-secondary" id="minifyBtn">한 줄로</button>
        <button class="btn btn-light" id="copyBtn">복사</button>
        <button class="btn btn-light" id="sampleBtn">예시 넣기</button>
      </div>
      <div class="grid-2">
        <div><label class="label">원본 SQL</label><textarea id="inputSql"></textarea></div>
        <div><label class="label">정리 결과</label><textarea id="outputSql" class="output" readonly></textarea></div>
      </div>
      <div id="message" class="msg"></div>
    </div>
    <div class="help-box"><h3>주의</h3><p>이 버전은 브라우저 단독 동작용 기본 포맷터라 복잡한 프로시저 전체를 완벽하게 다듬는 용도보다는, 일반 쿼리를 읽기 좋게 바꾸는 데 맞춰져 있습니다.</p></div>
    </div></section>
  </main>
  <script>
    const t = (key) => (window.ToolI18n ? window.ToolI18n.t(key) : key);
    const inputEl = document.getElementById('inputSql');
    const outputEl = document.getElementById('outputSql');
    const caseModeEl = document.getElementById('caseMode');
    const msgEl = document.getElementById('message');
    const sample = `select o.order_no, o.order_date, d.product_name, d.qty
from orders o inner join order_detail d on o.order_no = d.order_no
where o.order_date >= '2026-01-01' and d.qty > 0
group by o.order_no, o.order_date, d.product_name, d.qty
order by o.order_date desc;`;

    const majorKeywords = [
      'SELECT','FROM','WHERE','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','CROSS JOIN','JOIN','ON','UNION ALL','UNION','VALUES','SET'
    ];
    const inlineKeywords = ['AND','OR'];

    function setMessage(text, ok=false){ msgEl.textContent = text || ''; msgEl.className = ok ? 'msg ok' : 'msg'; }

    function normalizeCase(word){
      if (caseModeEl.value === 'upper') return word.toUpperCase();
      if (caseModeEl.value === 'lower') return word.toLowerCase();
      return word;
    }

    function escapeRegex(s){
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function replaceKeyword(text, kw){
      const pattern = '\\b' + escapeRegex(kw).replace(/\\\s+/g, '\\s+') + '\\b';
      const regex = new RegExp(pattern, 'gi');
      return text.replace(regex, match => normalizeCase(match.toUpperCase()));
    }

    function formatSql(sql){
      let text = sql.replace(/\s+/g, ' ').trim();
      majorKeywords.slice().sort((a,b)=>b.length-a.length).forEach(kw => { text = replaceKeyword(text, kw); });
      inlineKeywords.forEach(kw => { text = replaceKeyword(text, kw); });
      majorKeywords.slice().sort((a,b)=>b.length-a.length).forEach(kw => {
        const replaced = normalizeCase(kw);
        const pattern = '\\s*' + escapeRegex(replaced).replace(/\\\s+/g, '\\s+') + '\\s*';
        text = text.replace(new RegExp(pattern, 'g'), '\n' + replaced + ' ');
      });
      text = text.replace(/\n(ON|AND|OR)\s/gi, '\n  $1 ');
      text = text.replace(/SELECT\s+/i, match => match.trim() + '\n  ');
      text = text.replace(/,\s*/g, ',\n  ');
      text = text.replace(/\n\s*\n+/g, '\n');
      return text.trim();
    }

    document.getElementById('formatBtn').addEventListener('click', ()=>{
      const source = inputEl.value.trim();
      if(!source) return setMessage(t('msg_enter_sql'));
      outputEl.value = formatSql(source);
      setMessage(t('msg_done_format'), true);
    });
    document.getElementById('minifyBtn').addEventListener('click', ()=>{
      const source = inputEl.value.trim();
      if(!source) return setMessage(t('msg_enter_sql'));
      outputEl.value = source.replace(/\s+/g, ' ').trim();
      setMessage(t('msg_line_done'), true);
    });
    document.getElementById('copyBtn').addEventListener('click', async ()=>{
      if(!outputEl.value) return setMessage(t('msg_no_result'));
      await navigator.clipboard.writeText(outputEl.value);
      setMessage(t('msg_copied'), true);
    });
    document.getElementById('sampleBtn').addEventListener('click', ()=>{ inputEl.value = sample; outputEl.value=''; setMessage(''); });
    inputEl.value = sample;
  </script>
