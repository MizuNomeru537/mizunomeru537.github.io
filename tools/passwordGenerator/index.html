<main>
<section class="hero"><div class="container"><div class="hero-card"><div class="pill" id="pagePill">Security · random generation</div><h1 id="pageTitle">Password Generator</h1><p id="pageDesc">Generate strong random passwords with common security options.</p></div></div></section>
<section class="section"><div class="container"><div class="panel">
<div class="control-row">
<label data-page-key="label_length">Length</label><input id="pwLength" max="128" min="4" style="width:110px" type="number" value="16"/>
<label class="checkbox"><input checked="" id="optUpper" type="checkbox"/> <span data-page-key="opt_upper">Uppercase</span></label>
<label class="checkbox"><input checked="" id="optLower" type="checkbox"/> <span data-page-key="opt_lower">Lowercase</span></label>
<label class="checkbox"><input checked="" id="optNumbers" type="checkbox"/> <span data-page-key="opt_numbers">Numbers</span></label>
<label class="checkbox"><input checked="" id="optSymbols" type="checkbox"/> <span data-page-key="opt_symbols">Symbols</span></label>
</div>
<div class="control-row">
<button class="btn btn-primary" data-page-key="btn_generate" id="generateBtn">Generate</button>
<button class="btn btn-light" data-page-key="btn_copy" id="copyBtn">Copy Result</button>
<button class="btn btn-light" data-page-key="btn_generate_more" id="manyBtn">Generate 5</button>
</div>
<label class="label" data-page-key="label_passwords">Passwords</label>
<textarea class="small-textarea output" id="outputText" readonly=""></textarea>
<div class="msg" id="message"></div>
</div></div></section>
</main>
<script>
    const PAGE_TEXT = {"pill": {"en": "Security · random generation", "ko": "보안 · 랜덤 생성"}, "title": {"en": "Password Generator", "ko": "비밀번호 생성기"}, "desc": {"en": "Generate strong random passwords with common security options.", "ko": "길이와 문자 조합 옵션을 선택해 강한 랜덤 비밀번호를 생성합니다."}, "label_length": {"en": "Length", "ko": "길이"}, "opt_upper": {"en": "Uppercase", "ko": "대문자"}, "opt_lower": {"en": "Lowercase", "ko": "소문자"}, "opt_numbers": {"en": "Numbers", "ko": "숫자"}, "opt_symbols": {"en": "Symbols", "ko": "기호"}, "btn_generate": {"en": "Generate", "ko": "생성하기"}, "btn_copy": {"en": "Copy Result", "ko": "결과 복사"}, "btn_generate_more": {"en": "Generate 5", "ko": "5개 생성"}, "label_passwords": {"en": "Passwords", "ko": "생성 결과"}, "msg_pick_one": {"en": "Pick at least one character set.", "ko": "최소 한 가지 문자 종류를 선택하세요."}, "msg_done": {"en": "Password generated.", "ko": "비밀번호를 생성했습니다."}, "msg_empty": {"en": "Nothing to copy yet.", "ko": "복사할 결과가 없습니다."}, "msg_copied": {"en": "Copied to clipboard.", "ko": "클립보드에 복사했습니다."}};
    const pageT = (key) => {
      const lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      const entry = PAGE_TEXT[key] || {};
      return entry[lang] || entry.en || entry.ko || key;
    };
    function applyPageLanguage() {
      document.documentElement.lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      document.title = pageT('title');
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute('content', pageT('desc'));
      [['pagePill','pill'],['pageTitle','title'],['pageDesc','desc']].forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent = pageT(key); });
      document.querySelectorAll('[data-page-key]').forEach(el=>{
        const key = el.getAttribute('data-page-key');
        const attr = el.getAttribute('data-page-attr');
        const val = pageT(key);
        if(attr) el.setAttribute(attr, val); else el.textContent = val;
      });
      if (typeof window.onPageLangChange === 'function') window.onPageLangChange();
    }
    document.addEventListener('toollab:languagechange', applyPageLanguage);
    document.addEventListener('DOMContentLoaded', applyPageLanguage);

    const pwOut=document.getElementById('outputText'); const pwMsg=document.getElementById('message');
    function makePassword(){
      const len=Math.max(4, Math.min(128, parseInt(document.getElementById('pwLength').value||'16',10)));
      const pools=[];
      if(document.getElementById('optUpper').checked) pools.push('ABCDEFGHJKLMNPQRSTUVWXYZ');
      if(document.getElementById('optLower').checked) pools.push('abcdefghijkmnopqrstuvwxyz');
      if(document.getElementById('optNumbers').checked) pools.push('23456789');
      if(document.getElementById('optSymbols').checked) pools.push('!@#$%^&*()-_=+[]{}?');
      if(!pools.length){ pwMsg.textContent=pageT('msg_pick_one'); pwMsg.className='msg'; return ''; }
      let chars=pools.join('');
      let result='';
      const arr=new Uint32Array(len);
      crypto.getRandomValues(arr);
      for(let i=0;i<len;i++) result += chars[arr[i] % chars.length];
      return result;
    }
    function setMany(n){ pwOut.value = Array.from({length:n}, ()=>makePassword()).filter(Boolean).join('\n'); if(pwOut.value){ pwMsg.textContent=pageT('msg_done'); pwMsg.className='msg ok'; } }
    document.getElementById('generateBtn').addEventListener('click',()=>setMany(1));
    document.getElementById('manyBtn').addEventListener('click',()=>setMany(5));
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ if(!pwOut.value){ pwMsg.textContent=pageT('msg_empty'); pwMsg.className='msg'; return;} await navigator.clipboard.writeText(pwOut.value); pwMsg.textContent=pageT('msg_copied'); pwMsg.className='msg ok';});
    setMany(1);

  </script>
