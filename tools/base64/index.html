  <main>
    <section class="hero"><div class="container"><div class="hero-card"><div class="pill">Base64 · UTF-8 대응</div><h1>Base64 인코딩 / 디코딩</h1><p>한글 포함 텍스트를 안전하게 Base64로 변환하고, 반대로 Base64를 원문 텍스트로 복원할 수 있습니다.</p></div></div></section>
    <section class="section"><div class="container"><div class="panel">
      <div class="control-row">
        <button class="btn btn-primary" id="encodeBtn">인코딩</button>
        <button class="btn btn-secondary" id="decodeBtn">디코딩</button>
        <button class="btn btn-light" id="swapBtn">위아래 바꾸기</button>
        <button class="btn btn-light" id="copyBtn">결과 복사</button>
        <button class="btn btn-light" id="sampleBtn">예시 넣기</button>
      </div>
      <div class="grid-2">
        <div><label class="label">입력</label><textarea id="inputText"></textarea></div>
        <div><label class="label">결과</label><textarea id="outputText" class="output" readonly></textarea></div>
      </div>
      <div id="message" class="msg"></div>
    </div></div></section>
  </main>
  <script>
    const t = (key) => (window.ToolI18n ? window.ToolI18n.t(key) : key);
    const inputEl = document.getElementById('inputText');
    const outputEl = document.getElementById('outputText');
    const msgEl = document.getElementById('message');
    const sample = '안녕하세요. Tool Lab Base64 테스트입니다. Hello 123!';

    function setMessage(text, ok=false){ msgEl.textContent = text || ''; msgEl.className = ok ? 'msg ok' : 'msg'; }
    function encodeUtf8(text){
      const bytes = new TextEncoder().encode(text);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }
    function decodeUtf8(base64){
      const binary = atob(base64);
      const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    document.getElementById('encodeBtn').addEventListener('click', ()=>{
      try { outputEl.value = encodeUtf8(inputEl.value); setMessage(t('msg_encode_done'), true); }
      catch(err){ outputEl.value=''; setMessage('오류\n' + err.message); }
    });
    document.getElementById('decodeBtn').addEventListener('click', ()=>{
      try { outputEl.value = decodeUtf8(inputEl.value.trim()); setMessage(t('msg_decode_done'), true); }
      catch(err){ outputEl.value=''; setMessage('오류\n' + err.message); }
    });
    document.getElementById('swapBtn').addEventListener('click', ()=>{
      const tmp = inputEl.value; inputEl.value = outputEl.value; outputEl.value = tmp; setMessage(t('msg_swap_done'), true);
    });
    document.getElementById('copyBtn').addEventListener('click', async ()=>{
      if(!outputEl.value) return setMessage(t('msg_no_result'));
      await navigator.clipboard.writeText(outputEl.value);
      setMessage(t('msg_copied'), true);
    });
    document.getElementById('sampleBtn').addEventListener('click', ()=>{ inputEl.value = sample; outputEl.value=''; setMessage(''); });
    inputEl.value = sample;
  </script>
