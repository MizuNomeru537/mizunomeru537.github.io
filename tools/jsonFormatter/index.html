  <main>
    <section class="hero"><div class="container"><div class="hero-card"><div class="pill">JSON · 정리 / 압축 / 검증</div><h1>JSON 정리기</h1><p>JSON을 보기 좋게 정리하거나 공백 없이 압축하고, 문법이 맞는지 바로 확인할 수 있습니다.</p></div></div></section>
    <section class="section"><div class="container"><div class="panel">
      <div class="control-row">
        <label>들여쓰기
          <select id="indent">
            <option value="2">2칸</option>
            <option value="4">4칸</option>
          </select>
        </label>
        <button class="btn btn-primary" id="prettyBtn">정리하기</button>
        <button class="btn btn-secondary" id="minifyBtn">압축하기</button>
        <button class="btn btn-light" id="validateBtn">검증하기</button>
        <button class="btn btn-light" id="copyBtn">결과 복사</button>
        <button class="btn btn-light" id="sampleBtn">예시 넣기</button>
      </div>
      <div class="grid-2">
        <div><label class="label">원본 JSON</label><textarea id="inputJson"></textarea></div>
        <div><label class="label">결과</label><textarea id="outputJson" class="output" readonly></textarea></div>
      </div>
      <div id="message" class="msg"></div>
    </div>
    <div class="grid-3">
      <div class="help-box"><h3>정리하기</h3><p>JSON.parse 후 지정한 들여쓰기로 다시 직렬화합니다.</p></div>
      <div class="help-box"><h3>압축하기</h3><p>공백을 모두 제거해 한 줄 JSON으로 만듭니다.</p></div>
      <div class="help-box"><h3>검증하기</h3><p>문법 오류가 있으면 어느 지점에서 깨졌는지 메시지를 보여줍니다.</p></div>
    </div></div></section>
  </main>
  <script>
    const t = (key) => (window.ToolI18n ? window.ToolI18n.t(key) : key);
    const inputEl = document.getElementById('inputJson');
    const outputEl = document.getElementById('outputJson');
    const indentEl = document.getElementById('indent');
    const msgEl = document.getElementById('message');
    const sample = `{
  "project": "tool-lab",
  "enabled": true,
  "features": ["format", "minify", "copy"],
  "owner": {"name": "lee", "lang": "ko"}
}`;

    function setMessage(text, ok=false){ msgEl.textContent = text || ''; msgEl.className = ok ? 'msg ok' : 'msg'; }
    function parseJson(){ return JSON.parse(inputEl.value); }
    function pretty(){ outputEl.value = JSON.stringify(parseJson(), null, Number(indentEl.value)); setMessage(t('msg_done_format'), true); }
    function minify(){ outputEl.value = JSON.stringify(parseJson()); setMessage(t('msg_minify_done'), true); }
    function validate(){ parseJson(); setMessage(t('msg_valid_json'), true); }

    document.getElementById('prettyBtn').addEventListener('click', ()=>{ try{ pretty(); }catch(err){ outputEl.value=''; setMessage('오류\n' + err.message); } });
    document.getElementById('minifyBtn').addEventListener('click', ()=>{ try{ minify(); }catch(err){ outputEl.value=''; setMessage('오류\n' + err.message); } });
    document.getElementById('validateBtn').addEventListener('click', ()=>{ try{ validate(); }catch(err){ setMessage('오류\n' + err.message); } });
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ if(!outputEl.value) return setMessage(t('msg_no_result')); await navigator.clipboard.writeText(outputEl.value); setMessage(t('msg_copied'), true); });
    document.getElementById('sampleBtn').addEventListener('click', ()=>{ inputEl.value = sample; outputEl.value=''; setMessage(''); });
    inputEl.value = sample;
  </script>
