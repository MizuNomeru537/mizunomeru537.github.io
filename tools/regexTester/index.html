<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>Regex Tester</title>
  <meta name="description" content="Try regular expressions with custom flags and inspect match results." />
  <link rel="stylesheet" href="../../assets/tool.css" />
  <link rel="stylesheet" href="../../assets/lang.css" />
  <script defer src="../../assets/i18n.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="../../index.html" class="brand"><span class="brand-mark">⚡</span><span>도구랩</span></a>
      <nav class="nav">
        <a href="../../index.html">홈</a>
        <a href="../../index.html#featured">추천 도구</a>
        <a href="../../index.html#tools">전체 도구</a>
        <a href="../../about.html">소개</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero"><div class="container"><div class="hero-card"><div class="pill" id="pagePill">Pattern matching · live test</div><h1 id="pageTitle">Regex Tester</h1><p id="pageDesc">Try regular expressions with custom flags and inspect match results.</p></div></div></section>
    <section class="section"><div class="container"><div class="panel">
  <div class="control-row">
    <label data-page-key="label_pattern">Pattern</label><input id="patternInput" type="text" style="min-width:260px;flex:1" data-page-key="ph_pattern" data-page-attr="placeholder" placeholder="e.g. [A-Z]+" />
    <label data-page-key="label_flags">Flags</label><input id="flagsInput" type="text" value="g" style="width:90px" />
    <button class="btn btn-primary" id="testBtn" data-page-key="btn_test">Test</button>
    <button class="btn btn-light" id="sampleBtn" data-page-key="btn_sample">Load Sample</button>
  </div>
  <div class="grid-2">
    <div><label class="label" data-page-key="label_input">Source Text</label><textarea id="inputText"></textarea></div>
    <div><label class="label" data-page-key="label_matches">Matches</label><div id="matchList" class="match-list"></div></div>
  </div>
  <div id="message" class="msg"></div>
</div></div></section>
  </main>
  <script>
    const PAGE_TEXT = {"pill": {"en": "Pattern matching · live test", "ko": "패턴 매칭 · 실시간 테스트"}, "title": {"en": "Regex Tester", "ko": "정규식 테스터"}, "desc": {"en": "Try regular expressions with custom flags and inspect match results.", "ko": "플래그를 조절하며 정규식을 시험하고 매칭 결과를 바로 확인합니다."}, "label_pattern": {"en": "Pattern", "ko": "패턴"}, "ph_pattern": {"en": "e.g. [A-Z]+", "ko": "예: [A-Z]+"}, "label_flags": {"en": "Flags", "ko": "플래그"}, "btn_test": {"en": "Test", "ko": "테스트"}, "btn_sample": {"en": "Load Sample", "ko": "예시 넣기"}, "label_input": {"en": "Source Text", "ko": "원문 텍스트"}, "label_matches": {"en": "Matches", "ko": "매칭 결과"}, "msg_no_match": {"en": "No matches found.", "ko": "매칭된 결과가 없습니다."}, "msg_match_count": {"en": "matches found.", "ko": "개 매칭되었습니다."}, "msg_invalid_regex": {"en": "Invalid regular expression.", "ko": "정규식이 올바르지 않습니다."}};
    const pageT = (key) => {
      const lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      const entry = PAGE_TEXT[key] || {};
      return entry[lang] || entry.en || entry.ko || key;
    };
    function applyPageLanguage() {
      document.documentElement.lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      document.title = pageT('title');
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute('content', pageT('desc'));
      [['pagePill','pill'],['pageTitle','title'],['pageDesc','desc']].forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent = pageT(key); });
      document.querySelectorAll('[data-page-key]').forEach(el=>{
        const key = el.getAttribute('data-page-key');
        const attr = el.getAttribute('data-page-attr');
        const val = pageT(key);
        if(attr) el.setAttribute(attr, val); else el.textContent = val;
      });
      if (typeof window.onPageLangChange === 'function') window.onPageLangChange();
    }
    document.addEventListener('toollab:languagechange', applyPageLanguage);
    document.addEventListener('DOMContentLoaded', applyPageLanguage);

    const rxMsg=document.getElementById('message');
    function runRegex(){
      const pattern=document.getElementById('patternInput').value;
      const flags=document.getElementById('flagsInput').value;
      const input=document.getElementById('inputText').value;
      const list=document.getElementById('matchList');
      list.innerHTML='';
      try{
        const re=new RegExp(pattern, flags);
        const matches=Array.from(input.matchAll(re));
        if(!matches.length){ rxMsg.textContent=pageT('msg_no_match'); rxMsg.className='msg'; return; }
        matches.forEach((m,idx)=>{
          const div=document.createElement('div'); div.className='match-item';
          div.innerHTML=`<strong>#${idx+1}</strong><div class="inline-note">index: ${m.index}</div><div class="output-pre">${m[0]}</div>`;
          list.appendChild(div);
        });
        rxMsg.textContent=`${matches.length} ${pageT('msg_match_count')}`; rxMsg.className='msg ok';
      }catch(err){ rxMsg.textContent=pageT('msg_invalid_regex')+'\n'+err.message; rxMsg.className='msg'; }
    }
    document.getElementById('testBtn').addEventListener('click', runRegex);
    document.getElementById('sampleBtn').addEventListener('click', ()=>{
      document.getElementById('patternInput').value='[A-Z][a-z]+';
      document.getElementById('flagsInput').value='g';
      document.getElementById('inputText').value='ToolLab supports Regex Tester, Word Counter, and CSV to JSON.';
      runRegex();
    });

  </script>
  <footer class="footer">
    <div class="container footer-grid">
      <div><h4>도구랩</h4><p>브라우저에서 바로 사용하는 온라인 도구 모음.</p></div>

      <div><h4>정보</h4><a href="../../about.html">소개</a><a href="../../privacy.html">개인정보처리방침</a><a href="../../contact.html">문의</a></div>
    </div>
  </footer>
</body>
</html>
