<section class="hero"><div class="container"><div class="hero-card"><div class="pill">HTML Escape / Unescape</div><h1>HTML 변환기</h1><p>&lt;, &gt;, &amp;, 따옴표 같은 문자를 HTML 엔티티로 바꾸거나, 반대로 엔티티를 실제 문자로 복원합니다.</p></div></div></section>
<section class="section"><div class="container"><div class="panel">
<div class="control-row">
<button class="btn btn-primary" id="escapeBtn">Escape</button>
<button class="btn btn-secondary" id="unescapeBtn">Unescape</button>
<button class="btn btn-light" id="copyBtn">복사</button>
<button class="btn btn-light" id="sampleBtn">예시 넣기</button>
</div>
<div class="grid-2">
<div><label class="label">입력</label><textarea id="inputHtml"></textarea></div>
<div><label class="label">결과</label><textarea class="output" id="outputHtml" readonly=""></textarea></div>
</div>
<div class="msg" id="message"></div>
</div></div></section>
</main>
<script>
    const t = (key) => (window.ToolI18n ? window.ToolI18n.t(key) : key);
    const inputEl = document.getElementById('inputHtml');
    const outputEl = document.getElementById('outputHtml');
    const msgEl = document.getElementById('message');
    const sample = `<div class="card">
  <h1>Hello & Welcome</h1>
  <p>escape test</p>
</div>`;
    const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    function setMessage(text, ok=false){ msgEl.textContent = text || ''; msgEl.className = ok ? 'msg ok' : 'msg'; }
    function escapeHtml(text){ return text.replace(/[&<>"']/g, ch => escapeMap[ch]); }
    function unescapeHtml(text){
      const txt = document.createElement('textarea');
      txt.innerHTML = text;
      return txt.value;
    }
    document.getElementById('escapeBtn').addEventListener('click', ()=>{ outputEl.value = escapeHtml(inputEl.value); setMessage(t('msg_escape_done'), true); });
    document.getElementById('unescapeBtn').addEventListener('click', ()=>{ outputEl.value = unescapeHtml(inputEl.value); setMessage(t('msg_unescape_done'), true); });
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ if(!outputEl.value) return setMessage(t('msg_no_result')); await navigator.clipboard.writeText(outputEl.value); setMessage(t('msg_copied'), true); });
    document.getElementById('sampleBtn').addEventListener('click', ()=>{ inputEl.value = sample; outputEl.value=''; setMessage(''); });
    inputEl.value = sample;
  </script>
