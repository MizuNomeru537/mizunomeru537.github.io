<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>Lorem Ipsum Generator</title>
  <meta name="description" content="Generate placeholder paragraphs for mockups, CMS drafts, and layout testing." />
  <link rel="stylesheet" href="../../assets/tool.css" />
  <link rel="stylesheet" href="../../assets/lang.css" />
  <script defer src="../../assets/i18n.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8823365315472889"
     crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="../../index.html" class="brand"><span class="brand-mark">⚡</span><span>도구랩</span></a>
      <nav class="nav">
        <a href="../../index.html">홈</a>
        <a href="../../index.html#featured">추천 도구</a>
        <a href="../../index.html#tools">전체 도구</a>
        <a href="../../about.html">소개</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero"><div class="container"><div class="hero-card"><div class="pill" id="pagePill">Mockup text · placeholder content</div><h1 id="pageTitle">Lorem Ipsum Generator</h1><p id="pageDesc">Generate placeholder paragraphs for mockups, CMS drafts, and layout testing.</p></div></div></section>
    <section class="section"><div class="container"><div class="panel">
  <div class="control-row">
    <label data-page-key="label_paragraphs">Paragraphs</label><input id="paraCount" type="number" min="1" max="20" value="3" style="width:90px" />
    <label data-page-key="label_sentences">Sentences per paragraph</label><input id="sentCount" type="number" min="1" max="20" value="5" style="width:90px" />
    <button class="btn btn-primary" id="generateBtn" data-page-key="btn_generate">Generate</button>
    <button class="btn btn-light" id="copyBtn" data-page-key="btn_copy">Copy Result</button>
  </div>
  <label class="label" data-page-key="label_result">Generated Text</label>
  <textarea id="outputText" readonly></textarea>
  <div id="message" class="msg"></div>
</div></div></section>
  </main>
  <script>
    const PAGE_TEXT = {"pill": {"en": "Mockup text · placeholder content", "ko": "목업 텍스트 · 더미 문장 생성"}, "title": {"en": "Lorem Ipsum Generator", "ko": "Lorem Ipsum 생성기"}, "desc": {"en": "Generate placeholder paragraphs for mockups, CMS drafts, and layout testing.", "ko": "목업, CMS 초안, 레이아웃 테스트에 쓸 더미 문단을 생성합니다."}, "label_paragraphs": {"en": "Paragraphs", "ko": "문단 수"}, "label_sentences": {"en": "Sentences per paragraph", "ko": "문단당 문장 수"}, "btn_generate": {"en": "Generate", "ko": "생성하기"}, "btn_copy": {"en": "Copy Result", "ko": "결과 복사"}, "label_result": {"en": "Generated Text", "ko": "생성된 텍스트"}, "msg_generated": {"en": "Placeholder text generated.", "ko": "더미 텍스트를 생성했습니다."}, "msg_copied": {"en": "Copied result.", "ko": "결과를 복사했습니다."}};
    const pageT = (key) => {
      const lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      const entry = PAGE_TEXT[key] || {};
      return entry[lang] || entry.en || entry.ko || key;
    };
    function applyPageLanguage() {
      document.documentElement.lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      document.title = pageT('title');
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute('content', pageT('desc'));
      [['pagePill','pill'],['pageTitle','title'],['pageDesc','desc']].forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent = pageT(key); });
      document.querySelectorAll('[data-page-key]').forEach(el=>{
        const key = el.getAttribute('data-page-key');
        const attr = el.getAttribute('data-page-attr');
        const val = pageT(key);
        if(attr) el.setAttribute(attr, val); else el.textContent = val;
      });
      if (typeof window.onPageLangChange === 'function') window.onPageLangChange();
    }
    document.addEventListener('toollab:languagechange', applyPageLanguage);
    document.addEventListener('DOMContentLoaded', applyPageLanguage);

    const loremWords='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua'.split(' ');
    const liOut=document.getElementById('outputText'), liMsg=document.getElementById('message');
    function makeSentence(n){ const words=[]; for(let i=0;i<n;i++) words.push(loremWords[(i+Math.floor(Math.random()*loremWords.length)) % loremWords.length]); const s=words.join(' '); return s.charAt(0).toUpperCase()+s.slice(1)+'.'; }
    function generateLorem(){ const p=Math.max(1,Math.min(20,parseInt(document.getElementById('paraCount').value||'3',10))); const s=Math.max(1,Math.min(20,parseInt(document.getElementById('sentCount').value||'5',10))); liOut.value=Array.from({length:p},()=>Array.from({length:s},()=>makeSentence(8+Math.floor(Math.random()*8))).join(' ')).join('\n\n'); liMsg.textContent=pageT('msg_generated'); liMsg.className='msg ok'; }
    document.getElementById('generateBtn').addEventListener('click', generateLorem);
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ if(!liOut.value) return; await navigator.clipboard.writeText(liOut.value); liMsg.textContent=pageT('msg_copied'); liMsg.className='msg ok';});
    generateLorem();

  </script>
  <footer class="footer">
    <div class="container footer-grid">
      <div><h4>도구랩</h4><p>브라우저에서 바로 사용하는 온라인 도구 모음.</p></div>

    </div>
  </footer>
</body>
</html>
