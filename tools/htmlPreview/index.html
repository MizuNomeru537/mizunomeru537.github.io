<section class="hero"><div class="container"><div class="hero-card"><div class="pill" id="pagePill">Web editor · live render</div><h1 id="pageTitle">HTML Preview</h1><p id="pageDesc">Write HTML and render the result instantly inside the browser.</p></div></div></section>
<section class="section"><div class="container"><div class="panel">
<div class="control-row">
<button class="btn btn-primary" data-page-key="btn_preview" id="previewBtn">Preview</button>
<button class="btn btn-light" data-page-key="btn_sample" id="sampleBtn">Load Sample</button>
<button class="btn btn-light" data-page-key="btn_copy" id="copyBtn">Copy HTML</button>
</div>
<div class="grid-2">
<div><label class="label" data-page-key="label_html">HTML Source</label><textarea id="inputHtml"></textarea></div>
<div><label class="label" data-page-key="label_preview">Preview</label><iframe class="preview-frame" id="previewFrame"></iframe></div>
</div>
<div class="msg" id="message"></div>
</div></div></section>
</main>
<script>
    const PAGE_TEXT = {"pill": {"en": "Web editor · live render", "ko": "웹 에디터 · 실시간 렌더"}, "title": {"en": "HTML Preview", "ko": "HTML 미리보기"}, "desc": {"en": "Write HTML and render the result instantly inside the browser.", "ko": "HTML 코드를 입력하고 브라우저 안에서 즉시 렌더링 결과를 확인합니다."}, "btn_preview": {"en": "Preview", "ko": "미리보기"}, "btn_sample": {"en": "Load Sample", "ko": "예시 넣기"}, "btn_copy": {"en": "Copy HTML", "ko": "HTML 복사"}, "label_html": {"en": "HTML Source", "ko": "HTML 소스"}, "label_preview": {"en": "Preview", "ko": "미리보기"}, "msg_previewed": {"en": "Preview refreshed.", "ko": "미리보기를 갱신했습니다."}, "msg_copied": {"en": "HTML copied.", "ko": "HTML을 복사했습니다."}};
    const pageT = (key) => {
      const lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      const entry = PAGE_TEXT[key] || {};
      return entry[lang] || entry.en || entry.ko || key;
    };
    function applyPageLanguage() {
      document.documentElement.lang = window.ToolI18n ? window.ToolI18n.getLang() : 'en';
      document.title = pageT('title');
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute('content', pageT('desc'));
      [['pagePill','pill'],['pageTitle','title'],['pageDesc','desc']].forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent = pageT(key); });
      document.querySelectorAll('[data-page-key]').forEach(el=>{
        const key = el.getAttribute('data-page-key');
        const attr = el.getAttribute('data-page-attr');
        const val = pageT(key);
        if(attr) el.setAttribute(attr, val); else el.textContent = val;
      });
      if (typeof window.onPageLangChange === 'function') window.onPageLangChange();
    }
    document.addEventListener('toollab:languagechange', applyPageLanguage);
    document.addEventListener('DOMContentLoaded', applyPageLanguage);

    const hpIn=document.getElementById('inputHtml'), hpMsg=document.getElementById('message');
    function renderPreview(){ const doc=document.getElementById('previewFrame').contentWindow.document; doc.open(); doc.write(hpIn.value); doc.close(); hpMsg.textContent=pageT('msg_previewed'); hpMsg.className='msg ok'; }
    document.getElementById('previewBtn').addEventListener('click', renderPreview);
    document.getElementById('sampleBtn').addEventListener('click', ()=>{hpIn.value='<!doctype html><html><body style="font-family:Arial;padding:24px"><h1 style="color:#4f46e5">ToolLab HTML Preview</h1><p>This is a sample block rendered in the preview frame.</p><button style="padding:10px 14px;border-radius:10px;border:0;background:#111827;color:#fff">Button</button></body></html>'; renderPreview();});
    document.getElementById('copyBtn').addEventListener('click', async ()=>{ await navigator.clipboard.writeText(hpIn.value); hpMsg.textContent=pageT('msg_copied'); hpMsg.className='msg ok';});

  </script>
