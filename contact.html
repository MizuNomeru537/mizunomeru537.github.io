<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문의 | 도구랩</title>
  <meta name="description" content="도구랩 문의 페이지" />
  <meta name="robots" content="index,follow" />
  <link rel="stylesheet" href="./assets/tool.css" />
  <link rel="stylesheet" href="./assets/lang.css" />
  <style>
    .content-wrap{padding:40px 0 50px}
    .content-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}
    .content-card h1{margin:0 0 12px;font-size:40px;letter-spacing:-1px}
    .content-card h2{margin:28px 0 10px;font-size:24px;letter-spacing:-0.5px}
    .content-card p,.content-card li{color:var(--muted);line-height:1.85;font-size:16px}
    .content-card ul{padding-left:18px}
    .hero-note{margin:0 0 18px;color:#475569}
    .form-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    input,textarea{width:100%;border:1px solid #d7dfeb;border-radius:16px;padding:14px 16px;font-size:15px;outline:none;background:#fff}
    textarea{min-height:180px;resize:vertical}
    @media (max-width:900px){.form-grid{grid-template-columns:1fr} .content-card h1{font-size:34px}}
  </style>
  <script defer src="./assets/i18n.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="./index.html" class="brand"><span class="brand-mark">⚡</span><span>도구랩</span></a>
      <nav class="nav">
        <a href="./index.html">홈</a>
        <a href="./index.html#featured">추천 도구</a>

        <a href="./about.html">소개</a>
      </nav>
    </div>
  </header>
  <main class="content-wrap">
    <div class="container">
      
<div class="form-grid">
  <div class="content-card">
    <h1>문의</h1>
    <p class="hero-note">버그 제보, 도구 추가 요청, 광고 문의 등은 아래 형식으로 정리해두면 나중에 실제 전송 기능을 붙이기 편합니다.</p>
    <label class="label" for="name">이름</label>
    <input id="name" type="text" placeholder="이름 또는 닉네임" />
    <label class="label" for="email">이메일</label>
    <input id="email" type="email" placeholder="답변 받을 이메일 주소" />
    <label class="label" for="message">문의 내용</label>
    <textarea id="message" placeholder="예: SQL 정리기에서 특정 쿼리 줄바꿈이 이상합니다. 입력값은 ..."></textarea>
    <div style="margin-top:18px"><button class="btn btn-primary" type="button" onclick="alert('현재는 정적 페이지라 실제 전송 기능은 없습니다. 나중에 mailto 또는 외부 폼 서비스 연결이 필요합니다.')">문의 보내기</button></div>
  </div>
  <div class="content-card">
    <h2>운영 안내</h2>
    <ul>
      <li>버그 제보는 입력값과 결과를 같이 남기면 확인이 빠릅니다.</li>
      <li>도구 추가 요청은 이름과 필요한 기능을 같이 적어주면 좋습니다.</li>
      <li>현재 페이지는 디자인용 정적 버전입니다.</li>
    </ul>
  </div>
</div>

    </div>
  </main>

      <div><h4>도구랩</h4><p>개발 · 문서 · 변환 도구를 빠르게 제공하는 온라인 도구 모음 사이트.</p></div>

    </div>
  </footer>
